# yt-transcript Configuration Template
# Copy this file to config.yaml and fill in your settings
# This config surface is intentionally limited to flat top-level key/value pairs.
# Nested YAML and multi-line values are not supported.

# Deepgram API Key (get from https://console.deepgram.com/)
# Required only when a video has no usable subtitles and audio transcription is needed.
deepgram_api_key: "your_deepgram_api_key_here"
# Optional Deepgram model override. Keep nova-2 for the current stable path.
deepgram_model: "nova-2"
# Structured transcript assembly now defaults on.
# Set either flag to false only when debugging parity with the legacy flat path.
deepgram_enable_utterances: true
deepgram_prefer_structured_output: true

# Output directory for transcribed files. This is the only always-required field.
output_dir: "~/Downloads"

# yt-dlp tuning (optional)
# These default to conservative bounded values to avoid long hangs.
# Invalid, empty, or negative values automatically fall back to these defaults.
yt_dlp_socket_timeout_sec: 15
yt_dlp_retries: 1
yt_dlp_extractor_retries: 1

# YouTube anti-bot / login handling (optional)
# Default behavior: yt-transcript does NOT read browser cookies up front.
# If yt-dlp hits "Sign in to confirm you're not a bot", download.sh will
# automatically retry (up to 3 attempts) with: --cookies-from-browser chrome
#
# Leave these blank unless you want to force a specific auth source.
# This is useful when:
# - Chrome is not installed in the current environment
# - Chrome is installed but not logged into YouTube
# - You are running remotely / inside a container
#
# Option A: force a browser profile explicitly
#   yt_dlp_cookies_from_browser: "chrome"
#   # Examples: "chrome", "edge", "firefox", "safari" (depends on yt-dlp support)
#
# Option B: use an exported Netscape-format cookies.txt (most portable)
#   yt_dlp_cookies_file: "~/Downloads/youtube_cookies.txt"
yt_dlp_cookies_from_browser: ""
yt_dlp_cookies_file: ""

# LLM API Configuration
# Required only when plan-optimization selects long-video chunk processing,
# or when bilingual translation is needed.
# Format: "openai" (OpenAI-compatible) or "anthropic" (Anthropic Messages API)
llm_api_format: "openai"
llm_api_key: "your_llm_api_key_here"
# Can be either provider root URL or a /v1 URL; the tool normalizes both.
llm_base_url: "https://api.openai.com"
llm_model: "gpt-4o-mini"
# Request hardening for chunk processing
llm_timeout_sec: 180
llm_max_retries: 3
llm_backoff_sec: 1.5
# Streaming mode: auto | true | false
llm_stream: "auto"
# Small probe used by preflight.sh --require-llm
llm_probe_timeout_sec: 20
llm_probe_max_tokens: 16
# Stop batch if provider times out repeatedly
llm_stop_after_consecutive_timeouts: 2
# Re-run suspiciously short / malformed chunk outputs before surfacing warnings
llm_chunk_recovery_attempts: 1
llm_chunk_recovery_backoff_sec: 1.0

# Chunk planning
# Default mode is token-aware. Set to "chars" for legacy character chunking.
chunk_mode: "tokens"
# Override the per-task chunk target in the active mode. 0 disables override.
chunk_size_override: 0
chunk_tokens_structure_only: 1200
chunk_tokens_quick_cleanup: 1000
chunk_tokens_translate_only: 900
chunk_tokens_summarize: 2500
# Soft target * multiplier for forced split guardrail. Valid range: 1.0-2.0.
chunk_hard_cap_multiplier: 1.33
chunk_safety_buffer_tokens: 400
chunk_overlap_sentences: 0
# Continuity context uses the last N sentence(s) from the previous chunk.
chunk_context_tail_sentences: 1
# Soft token cap for the carried continuity excerpt.
chunk_context_summary_tokens: 60
output_ratio_structure_only: 1.15
output_ratio_quick_cleanup: 1.05
output_ratio_translate_only: 1.10
output_ratio_summarize: 0.15
max_output_tokens_structure_only: 1800
max_output_tokens_quick_cleanup: 1400
max_output_tokens_translate_only: 1500
max_output_tokens_summarize: 384
enable_token_count_probe: true
enable_chunk_autotune: false
autotune_reduce_percent: 0.25
autotune_increase_percent: 0.10
autotune_success_window: 20
autotune_p95_latency_threshold_ms: 45000
# Number of early chunks to treat as canaries before the plan is considered stable.
autotune_canary_chunks: 3
